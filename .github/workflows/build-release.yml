name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Create keystore file
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "Keystore created: $(ls -la app/release.keystore)"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Signed Release APK
        working-directory: .
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tail -60

      - name: Check APK output
        run: |
          echo "=== APK Output ==="
          find app/build/outputs -name "*.apk" -type f 2>/dev/null | while read apk; do
            echo "Found APK: $apk ($(du -h "$apk" | cut -f1))"
          done

      - name: Verify APK Signing
        if: always()
        continue-on-error: true
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/*.apk 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "WARNING: No APK found to verify"
            exit 0
          fi
          echo "=== APK Info ==="
          echo "APK file: $APK_PATH"
          echo "APK size: $(du -h "$APK_PATH" | cut -f1)"
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"
          $BUILD_TOOLS/aapt dump badging "$APK_PATH" | head -3 || true
          echo ""
          echo "=== Signing Verification ==="
          $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK_PATH" 2>&1 || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.sha }}
          name: "FreeSearch v1.0.0"
          body: |
            ## FreeSearch APK v1.0.0
            - Android 7+ (API 24+)
            - APK Signed v2+v3
            - Multi-engine search (DuckDuckGo, Brave, Startpage, Qwant, Custom)
            - No content filtering
            - Dark mode support
            - Search history
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
