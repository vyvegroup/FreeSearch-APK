name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Create keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease \
            -PkeystoreFile=release.keystore \
            -PkeystorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.KEY_PASSWORD }}"
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK Signing (v2 + v3)
        run: |
          sudo apt-get install -y apksigner 2>/dev/null || true
          APK_PATH=$(find app/build/outputs/apk/release/*.apk | head -1)
          echo "APK: $APK_PATH"
          ls -la "$APK_PATH"
          # Verify with zipalign
          $ANDROID_HOME/build-tools/*/zipalign -c -v 4 "$APK_PATH" || true
          # Show APK info
          $ANDROID_HOME/build-tools/*/aapt dump badging "$APK_PATH" | head -5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-${{ github.sha }}
          name: FreeSearch v1.0.0
          body: |
            ## FreeSearch APK v1.0.0
            - Android 7+ (API 24+)
            - APK Signed v2+v3
            - Multi-engine search (DuckDuckGo, Brave, Startpage, Qwant, Custom)
            - No content filtering
            - Dark mode support
            - Search history
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
