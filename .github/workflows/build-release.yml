name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Create keystore file
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease 2>&1 | tee build-output.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log

      - name: List all APK outputs
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Verify APK Signing
        if: always()
        continue-on-error: true
        run: |
          APK_PATH=$(find . -path "*/outputs/apk/release/*" -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then exit 0; fi
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $BUILD_TOOLS/aapt dump badging "$APK_PATH" | head -3 || true
          $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK_PATH" 2>&1 || true

      - name: Copy APK for release upload
        if: success()
        run: |
          APK_PATH=$(find . -path "*/outputs/apk/release/*" -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then cp "$APK_PATH" build-output.apk; echo "Copied: $APK_PATH"; else echo "No APK found"; fi

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.0-${{ github.sha }}
          name: "FreeSearch Browser v3.0.0"
          body: |
            ## FreeSearch Browser v3.0.0
            - Chromium-based browser
            - Self-hosted crawler + indexer + search
            - No content filtering
            - SQLite FTS5 + BM25 ranking
            - Android 7+ (API 24+)
            - Package: com.vyvegroup.freesearch
            - Signed v2+v3
          files: |
            build-output.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
