name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Create keystore file
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          ls -la app/release.keystore
          file app/release.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: List all APK outputs
        run: |
          echo "=== Scanning for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Build outputs ==="
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Verify APK Signing
        if: always()
        continue-on-error: true
        run: |
          APK_PATH=$(find . -path "*/outputs/apk/release/*" -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "WARNING: No release APK found"
            find . -name "*.apk" -type f 2>/dev/null
            exit 0
          fi
          echo "APK: $APK_PATH"
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"
          $BUILD_TOOLS/aapt dump badging "$APK_PATH" | head -3 || true
          echo "=== Signing ==="
          $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK_PATH" 2>&1 || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.sha }}
          name: "FreeSearch Browser v3.0.0"
          body: |
            ## FreeSearch Browser v3.0.0
            - Full Browser with built-in search engine
            - Self-hosted crawler + indexer + search
            - No content filtering
            - SQLite FTS5 with BM25 ranking
            - Android 7+ (API 24+)
            - APK Signed v2+v3
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
