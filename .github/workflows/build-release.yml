name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Create keystore file
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease 2>&1 | tee build-output.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log

      - name: List all APK outputs
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Verify APK Signing
        if: always()
        continue-on-error: true
        run: |
          APK_PATH=$(find . -path "*/outputs/apk/release/*" -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then exit 0; fi
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          $BUILD_TOOLS/aapt dump badging "$APK_PATH" | head -3 || true
          $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK_PATH" 2>&1 || true

      - name: Upload APK to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find . -path "*/outputs/apk/release/*" -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then echo "ERROR: No APK"; exit 1; fi
          echo "Releasing: $APK_PATH ($(du -h "$APK_PATH" | cut -f1))"
          TAG="v3.0.0-${{ github.sha }}"
          # Create release
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"FreeSearch Browser v3.0.0\",\"body\":\"FreeSearch Browser v3.0.0 - Chromium-based with built-in FreeSearch engine. No content filtering.\",\"draft\":false,\"prerelease\":false}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''), d.get('message',''))"
          # Get upload URL
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          UPLOAD_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(a['name'],a['upload_url']) for a in d.get('upload_url',[])]")
          echo "Release ID: $RELEASE_ID"
          echo "Upload URL: $UPLOAD_URL"
          # Upload APK
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK_PATH" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=FreeSearch-Browser-v3.apk" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name',''), d.get('state',''), d.get('message',''))"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn
